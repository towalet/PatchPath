<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PatchPath - find the root cause of deployment failures and follow an evidence-backed fix."
    />
    <meta name="theme-color" content="#000000" />
    <title>PatchPath - Deployment Diagnostics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!--
      Inline boot screen. Lives in the document so it paints on the very first
      frame before the CSS/JS bundle loads, avoiding a white flash or blank root.
      main.tsx fades #app-boot out once the app has mounted and fonts are ready.
    -->
    <style>
      html,
      body {
        margin: 0;
        background: #000;
      }
      #root {
        min-height: 100vh;
      }
      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #000;
        transition: opacity 0.45s ease;
      }
      #app-boot.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      .app-boot__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        width: min(560px, 78vw);
      }
      .app-boot__line {
        position: relative;
        display: block;
        width: 100%;
        height: 16px;
        border: 1px solid #2a2a2a;
        background:
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 10px, transparent 10px 16px),
          #000;
        overflow: hidden;
        box-shadow: 0 0 36px rgba(255, 255, 255, 0.08);
      }
      .app-boot__line::before {
        content: "";
        position: absolute;
        inset: 2px;
        width: 42%;
        background: repeating-linear-gradient(
          90deg,
          #fff 0 10px,
          rgba(255, 255, 255, 0.65) 10px 12px,
          transparent 12px 16px
        );
        animation: app-boot-line 1.2s steps(14, end) infinite;
      }
      .app-boot__line::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 2px,
          rgba(0, 0, 0, 0.5) 3px,
          transparent 4px
        );
      }
      .app-boot__label {
        font-family: "JetBrains Mono", "Consolas", monospace;
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #6b6b6b;
      }
      @keyframes app-boot-line {
        from {
          transform: translateX(-44%);
        }
        to {
          transform: translateX(242%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-boot {
          transition: none;
        }
        .app-boot__line::before {
          animation: none;
          transform: none;
          width: 72%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-boot" role="status" aria-label="Loading PatchPath">
      <div class="app-boot__inner">
        <span class="app-boot__line" aria-hidden="true"></span>
        <span class="app-boot__label">Initializing diagnostics...</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
