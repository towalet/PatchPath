name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel an in-flight run for the same ref when a new one is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: ruff lint + format check (no database needed)
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.5.6

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Backend: pytest against a real PostgreSQL instance
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend — Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: patchpath
          POSTGRES_PASSWORD: patchpath
          POSTGRES_DB: patchpath_test
        options: >-
          --health-cmd "pg_isready -U patchpath"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-not-used-in-production
      DATABASE_URL: postgres://patchpath:patchpath@localhost:5432/patchpath_test
      OPENAI_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=apps --cov-report=term-missing -q

  # ---------------------------------------------------------------------------
  # Frontend: ESLint → TypeScript → Vite build
  # ---------------------------------------------------------------------------
  frontend-check:
    name: Frontend — Lint / Typecheck / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Docker: validate production image builds for both services
  # Runs only after all quality gates pass.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend (prod)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend (prod)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
